<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower of God — Character Sheet</title>
  <meta name="theme-color" content="#0A0A0A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/base.css">
  <link rel="stylesheet" href="/src/styles/forms.css">
  <link rel="stylesheet" href="/src/styles/notifications.css">
  <link rel="stylesheet" href="/src/styles/login.css">
</head>
<body data-theme="dark-red">
  <div class="login-page">
    <div class="login-glow"></div>
    <div class="login-container">
      <div class="login-emblem">
        <img src="/tower-emblem.png" alt="Tower of God — 神之塔" class="emblem-image" id="emblem-image">
        <svg id="emblem-fallback" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" class="emblem-svg">
          <text x="200" y="60" text-anchor="middle" fill="white" font-size="42" font-weight="700" letter-spacing="12">TOWER OF GOD</text>
          <text x="200" y="95" text-anchor="middle" fill="#666" font-size="14" letter-spacing="8">CHARACTER SHEET</text>
        </svg>
      </div>
      <div class="login-subtitle">Character Sheet</div>
      <button id="btn-sign-in" class="btn-enter">
        <span class="btn-enter-text">ENTER THE TOWER</span>
        <span class="btn-enter-glow"></span>
      </button>
      <div class="login-footer"><p>A companion app for the Tower of God TTRPG campaign.</p></div>
    </div>
  </div>
  <script>
    const img = document.getElementById('emblem-image');
    const fallback = document.getElementById('emblem-fallback');
    img.addEventListener('error', function() { this.style.display = 'none'; fallback.style.display = 'block'; });
    img.addEventListener('load', function() { fallback.style.display = 'none'; });
  </script>
  <script type="module" src="/src/pages/login.js"></script>
</body>
</html>
