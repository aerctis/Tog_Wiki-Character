<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower of God — Character Sheet</title>
  <meta name="theme-color" content="#0A0A0A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/base.css">
  <link rel="stylesheet" href="/src/styles/forms.css">
  <link rel="stylesheet" href="/src/styles/notifications.css">
  <link rel="stylesheet" href="/src/styles/login.css">
</head>
<body data-theme="dark-red">
  <div class="login-page">
    <div class="login-glow"></div>
    <div class="login-container">
      <div class="login-emblem">
        <!-- Primary: PNG emblem image -->
        <img src="/tower-emblem.png" alt="Tower of God" class="emblem-image" id="emblem-image"
             onerror="this.style.display='none'; document.getElementById('emblem-fallback').style.display='block';"
             onload="document.getElementById('emblem-fallback').style.display='none';">
        <!-- Fallback: SVG text if image missing -->
        <svg id="emblem-fallback" viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg" class="emblem-svg">
          <text x="300" y="55" text-anchor="middle" fill="white" font-size="40" font-weight="700" letter-spacing="10" font-family="Inter, system-ui, sans-serif">TOWER OF GOD</text>
          <text x="300" y="90" text-anchor="middle" fill="#555" font-size="13" letter-spacing="6" font-family="Inter, system-ui, sans-serif">CHARACTER SHEET</text>
        </svg>
      </div>
      <div class="login-subtitle">Character Sheet</div>
      <button id="btn-sign-in" class="btn-enter">
        <span class="btn-enter-text">ENTER THE TOWER</span>
        <span class="btn-enter-glow"></span>
      </button>
      <div class="login-footer"><p>A companion app for the Tower of God TTRPG campaign.</p></div>
    </div>
  </div>
  <script type="module" src="/src/pages/login.js"></script>
</body>
</html>
