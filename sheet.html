<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToG — Character Sheet</title>
  <meta name="theme-color" content="#09090b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/base.css">
  <link rel="stylesheet" href="/src/styles/forms.css">
  <link rel="stylesheet" href="/src/styles/notifications.css">
  <link rel="stylesheet" href="/src/styles/layout.css">
  <link rel="stylesheet" href="/src/styles/widgets.css">
  <link rel="stylesheet" href="/src/styles/modals.css">
</head>
<body data-theme="dark-red">
  <div class="sheet-page">
    <header class="sheet-header">
      <div class="brand"><span class="brand-accent">ToG</span><span>Sheet</span></div>
      <nav>
        <a href="/sheet.html" class="active">Sheet</a>
        <a href="/compendium.html">Compendium</a>
        <a href="/admin.html" id="nav-admin" style="display: none;">Admin</a>
      </nav>
      <div class="header-actions">
        <span class="user-name" id="user-display-name"></span>
        <button id="btn-sign-out" class="btn-ghost btn-sm">Sign Out</button>
      </div>
    </header>

    <!-- 
      NEW LAYOUT — Priority: Combat > Equipment > Stats > Skills
      Row 1: Combat Stats (5) + Equipment (7)
      Row 2: Stats (5) + Skills (4) + Resources (3)
      Row 3: Affinities & Proficiencies (4) + Identity (4) + Backstory (4)
    -->
    <main class="dashboard" id="dashboard">

      <!-- ROW 1: THE ACTION ROW -->
      <div class="widget widget--primary" id="top-stats-widget" style="grid-column: span 5;">
        <div class="widget-header"><h3>Combat</h3></div>
        <div id="top-stats-content"></div>
      </div>

      <div class="widget widget--primary" id="equipment-widget" style="grid-column: span 7;">
        <div class="widget-header">
          <h3>Equipment</h3>
          <div class="widget-actions">
            <button id="btn-compendium" class="btn-sm btn-ghost">Compendium</button>
          </div>
        </div>
        <div id="equipment-content"></div>
      </div>

      <!-- ROW 2: THE DATA ROW -->
      <div class="widget widget--primary" id="stats-widget" style="grid-column: span 5;">
        <div class="widget-header"><h3>Stats</h3></div>
        <div id="stats-content"></div>
      </div>

      <div class="widget widget--primary" id="skills-widget" style="grid-column: span 4;">
        <div class="widget-header"><h3>Skills</h3></div>
        <div id="skills-content"></div>
      </div>

      <div class="widget" id="resources-widget" style="grid-column: span 3;">
        <div class="widget-header"><h3>Resources</h3></div>
        <div id="resources-content"></div>
      </div>

      <!-- ROW 3: SECONDARY — set-and-forget -->
      <div class="widget widget--secondary" id="traits-widget" style="grid-column: span 4;">
        <div class="widget-header"><h3>Traits</h3></div>
        <div id="affinities-content"></div>
        <div style="border-top: 1px solid var(--border-subtle); margin-top: var(--space-3); padding-top: var(--space-3);">
          <div style="font-size: var(--text-xs); text-transform: uppercase; letter-spacing: var(--tracking-widest); color: var(--text-muted); margin-bottom: var(--space-2); font-weight: 500;">Proficiencies</div>
          <div id="proficiencies-content"></div>
        </div>
      </div>

      <div class="widget widget--secondary" id="identity-widget" style="grid-column: span 4;">
        <div class="widget-header"><h3>Identity</h3></div>
        <div id="identity-content"></div>
        <!-- Progression merged in -->
        <div style="border-top: 1px solid var(--border-subtle); margin-top: var(--space-3); padding-top: var(--space-3);">
          <div id="progression-content"></div>
        </div>
      </div>

      <div class="widget widget--secondary" id="backstory-widget" style="grid-column: span 4;">
        <div class="widget-header"><h3>Notes</h3></div>
        <div id="backstory-content"></div>
      </div>
    </main>
  </div>

  <div id="modal-root"></div>
  <script type="module" src="/src/pages/sheet.js"></script>
</body>
</html>
